site_name: Yu C++ライブラリ
site_url: https://CapyBarrier.github.io/yu/
site_dir: ../build/docs/site

repo_url: https://github.com/CapyBarrier/yu
repo_name: CapyBarrier/yu

validation:
  links:
    absolute_links: ignore
    unrecognized_links: ignore

plugins:
  - search
  - awesome-pages
  - macros:
      include_dir: docs/assets/includes
      module_name: macros


theme:
  name: material
  language: ja
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  palette:
    primary: deep-purple
    accent: blue
  features:
    - navigation.indexes
    - navigation.tabs
    - toc.integrate

markdown_extensions:
  - admonition
  - def_list
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      line_spans: __span
      pygments_lang_class: true
