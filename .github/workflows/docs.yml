name: Deploy MkDocs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: |
          pip install mkdocs==1.6.1 mkdocs-material mkdocs-awesome-pages-plugin

      - name: Deploy documentation
        run: mkdocs gh-deploy --force
        working-directory: docs